name = "P13"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["P13"]

[leanOptions]
pp.unicode.fun = true
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = false
weak.linter.style.header = false
maxSynthPendingDepth = 3

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.32.0"

[[lean_lib]]
name = "P13"

[[lean_exe]]
name = "dump"
root = "Dump"
